query CartInput($collectionIds: [ID!] = []) {
  cart {
    buyerIdentity {
      customer {
        metafield(namespace: "$app:student-discount", key: "institute_key") {
          value
        }
      }
    }
    lines {
      id
      merchandise {
        __typename
        ... on ProductVariant {
          product {
            ipad: inAnyCollection(ids: ["gid://shopify/Collection/452991221978"])
            mac: inAnyCollection(ids: ["gid://shopify/Collection/452991746266"])
            accessories: inAnyCollection(ids: ["gid://shopify/Collection/453527797978"])
            iphone: inAnyCollection(ids: ["gid://shopify/Collection/452991123674"])
            dynamicCollections: inCollections(ids: $collectionIds) {
              collectionId
              isMember
            }
          }
        }
      }
    }
  }
  discount {
    discountClasses
    discountConfig: metafield(
      namespace: "$app:category-tier-discount-native"
      key: "function-configuration"
    ) {
      value
    }
    automaticConfig: metafield(
      namespace: "student-discount-shared"
      key: "automatic-configuration"
    ) {
      value
    }
  }
}
